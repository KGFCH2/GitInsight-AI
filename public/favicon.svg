<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Stylized G / Git Branch Curve -->
  <path d="M80,50 C80,66.57 66.57,80 50,80 C33.43,80 20,66.57 20,50 C20,33.43 33.43,20 50,20 C58.28,20 65.78,23.36 71.21,28.79 L85.35,14.65 C76.32,5.61 63.82,0 50,0 C22.39,0 0,22.39 0,50 C0,77.61 22.39,100 50,100 C77.61,100 100,77.61 100,50 L80,50 Z" fill="url(#logo-grad)" filter="url(#glow)" />
  
  <!-- Inner AI Neural Node / Branch Joint -->
  <circle cx="50" cy="50" r="12" fill="white" />
  <circle cx="50" cy="50" r="20" fill="white" fill-opacity="0.1" />
  
  <!-- Connecting Nodes for AI feel -->
  <circle cx="80" cy="50" r="6" fill="#0ea5e9" />
  <circle cx="50" cy="20" r="6" fill="#2563eb" />
</svg>
